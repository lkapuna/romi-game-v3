<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>🎨 תחרות הציורים של רומי</title>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Heebo:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0918;--card:#1e1b38;--surf:#14122a;--b:rgba(255,255,255,0.08);--r:#ff6b6b;--y:#ffd93d;--g:#6bcb77;--bl:#4d96ff;--tx:#f0eeff;--mu:#7b79a0}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;direction:rtl}
input,button{font-family:inherit}
.f{font-family:'Fredoka One',cursive!important}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bonce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes fall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fu{animation:fadeUp .3s ease both}
.spin{display:inline-block;width:34px;height:34px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--y);border-radius:50%;animation:spin .8s linear infinite}
.bo{animation:bonce 1s ease infinite}

/* layout */
.wrap{max-width:820px;margin:0 auto;padding:20px 14px}
.screen{display:none}.screen.active{display:block}
.card{background:var(--card);border-radius:18px;padding:24px;border:1px solid var(--b);margin-bottom:14px}

/* title */
.title{font-size:clamp(1.7rem,5vw,2.6rem);text-align:center;margin-bottom:4px;background:linear-gradient(135deg,#ff6b6b,#ffd93d,#4d96ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{text-align:center;color:var(--mu);margin-bottom:26px;font-size:.9rem}

/* tabs */
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.tab{padding:11px;border-radius:10px;border:2px solid var(--b);background:var(--surf);color:var(--mu);cursor:pointer;text-align:center;font-weight:700;transition:all .2s}
.tab.on{border-color:var(--bl);color:var(--bl);background:rgba(77,150,255,.1)}

/* inputs */
.inp{width:100%;background:var(--surf);border:1px solid var(--b);border-radius:10px;padding:11px 14px;color:var(--tx);font-size:1rem;margin-bottom:12px;transition:border-color .2s}
.inp:focus{outline:none;border-color:var(--bl)}
.lbl{color:var(--mu);font-size:.83rem;display:block;margin-bottom:5px}

/* max players */
.mpgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:16px}
.mpbtn{padding:9px;border-radius:9px;border:2px solid var(--b);background:var(--surf);color:var(--mu);cursor:pointer;text-align:center;font-weight:700;font-size:.88rem;transition:all .2s}
.mpbtn.on{border-color:var(--y);color:var(--y);background:rgba(255,217,61,.1)}

/* buttons */
.btn{width:100%;padding:13px;border-radius:12px;border:none;cursor:pointer;font-size:1.1rem;transition:all .2s}
.btn:hover{transform:translateY(-2px)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.btn-blue{background:linear-gradient(135deg,var(--bl),#7b2fff);color:#fff;font-family:'Fredoka One',cursive}
.btn-green{background:linear-gradient(135deg,var(--g),#2ea04b);color:#fff;font-family:'Fredoka One',cursive}
.btn-yel{background:linear-gradient(135deg,var(--y),#ff8c42);color:#111;font-family:'Fredoka One',cursive}

/* lobby */
.pslots{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.pslot{display:flex;align-items:center;gap:11px;background:var(--surf);border-radius:10px;padding:11px 14px;border:1px solid var(--b);transition:all .3s}
.pslot.empty{opacity:.45;border-style:dashed}
.dot{width:13px;height:13px;border-radius:50%;flex-shrink:0}
.badge{font-size:.72rem;padding:2px 8px;border-radius:20px;margin-right:auto}
.badge-host{background:rgba(255,217,61,.15);color:var(--y)}
.badge-ready{background:rgba(107,203,119,.15);color:var(--g)}
.prog-wrap{margin-bottom:16px}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prog-bar-bg{background:var(--surf);border-radius:20px;height:9px;overflow:hidden}
.prog-bar{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--bl),#7b2fff);transition:width .4s}

/* code box */
.codebox{background:var(--surf);border-radius:12px;padding:14px 18px;text-align:center;border:1px solid var(--b);margin-bottom:14px}
.bigcode{font-family:'Fredoka One',cursive;font-size:2.6rem;letter-spacing:7px;color:var(--y);margin:4px 0}
.copybtn{background:rgba(77,150,255,.15);border:1px solid rgba(77,150,255,.3);color:var(--bl);padding:5px 14px;border-radius:8px;cursor:pointer;font-size:.82rem;margin-top:5px}

/* scoreboard */
.scores{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.sc{display:flex;align-items:center;gap:6px;flex:1;min-width:90px;background:var(--surf);border-radius:9px;padding:7px 10px}
.sc-name{font-size:.83rem;font-weight:700;flex:1}

/* draw screen */
.round-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.topic-box{background:var(--surf);border-radius:10px;padding:9px 15px;margin-bottom:12px;display:flex;gap:7px;align-items:center;border:1px solid var(--b)}
.timer{font-size:2.6rem;display:inline-block}
.timer.red{color:var(--r);animation:bonce .5s ease infinite}
.tools{display:flex;align-items:center;gap:6px;margin-bottom:9px;flex-wrap:wrap}
.tbtn{background:var(--surf);border:1px solid var(--b);color:var(--tx);padding:5px 11px;border-radius:7px;cursor:pointer;font-size:.82rem;transition:all .15s}
.tbtn.on{background:var(--bl);border-color:var(--bl)}
.swatch{width:23px;height:23px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s;flex-shrink:0}
.swatch.on{border-color:#fff;transform:scale(1.2)}
canvas{display:block;width:100%;cursor:crosshair;touch-action:none;border-radius:10px;border:2px solid var(--b);background:#fff}
.cactions{display:flex;gap:8px;margin-top:10px}
.submitted-over{position:absolute;inset:0;background:rgba(10,9,24,.82);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;font-family:'Fredoka One',cursive;font-size:1.3rem}

/* waiting chips */
.wlist{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.witem{display:flex;align-items:center;gap:9px;background:var(--surf);border-radius:9px;padding:8px 12px;font-size:.88rem}

/* drawings grid */
.dgrid{display:grid;gap:10px;margin-bottom:18px}
.dcard{background:var(--surf);border-radius:10px;padding:10px;text-align:center;border:2px solid transparent;transition:all .35s}
.dcard.win{border-color:var(--y);box-shadow:0 0 18px rgba(255,217,61,.25)}
.dcard img{width:100%;border-radius:7px;margin-bottom:6px}
.dname{font-weight:700;font-size:.88rem}

/* verdict */
.vbox{background:var(--surf);border-radius:12px;padding:18px;border-right:4px solid var(--y);margin-bottom:14px}
.vwinner{font-family:'Fredoka One',cursive;font-size:1.4rem;margin-bottom:6px}
.vreason{color:var(--mu);line-height:1.55;font-size:.93rem}

/* final */
.frow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--b)}
.frow:last-child{border:none}

/* toast */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--r);color:#fff;padding:11px 22px;border-radius:11px;font-weight:700;z-index:999;animation:fadeUp .3s ease;white-space:nowrap}

/* confetti */
#conf{position:fixed;inset:0;pointer-events:none;z-index:998}
.cp{position:absolute;width:9px;height:9px;border-radius:2px;animation:fall linear forwards}
</style>
</head>
<body>
<div id="conf"></div>
<div class="wrap">
  <h1 class="f title fu">🎨 תחרות הציורים של רומי</h1>
  <p class="sub fu">צייר, התחרה, נצח!</p>

  <!-- HOME -->
  <div id="sHome" class="screen active fu">
    <div class="card">
      <div class="tabs">
        <div class="tab on" id="t1" onclick="tab('create')">פתח חדר חדש</div>
        <div class="tab" id="t2" onclick="tab('join')">הצטרף לחדר</div>
      </div>
      <div id="pCreate">
        <label class="lbl">השם שלך</label>
        <input class="inp" id="cName" placeholder="הכנס שם..."/>
        <label class="lbl">כמה שחקנים?</label>
        <div class="mpgrid">
          <div class="mpbtn on" id="mp2" onclick="setMax(2)">2 שחקנים</div>
          <div class="mpbtn" id="mp3" onclick="setMax(3)">3 שחקנים</div>
          <div class="mpbtn" id="mp4" onclick="setMax(4)">4 שחקנים</div>
        </div>
        <button class="btn btn-blue" onclick="createRoom()">✨ פתח חדר</button>
      </div>
      <div id="pJoin" style="display:none">
        <label class="lbl">השם שלך</label>
        <input class="inp" id="jName" placeholder="הכנס שם..."/>
        <label class="lbl">קוד חדר</label>
        <input class="inp" id="jCode" placeholder="XXXXX" style="text-transform:uppercase;letter-spacing:4px;font-size:1.2rem;text-align:center"/>
        <button class="btn btn-blue" onclick="joinRoom()">🚪 הצטרף</button>
      </div>
    </div>
  </div>

  <!-- LOBBY -->
  <div id="sLobby" class="screen fu">
    <div class="card">
      <h2 class="f" style="color:var(--y);margin-bottom:14px;font-size:1.25rem">🎮 ממתינים לשחקנים...</h2>
      <div class="codebox">
        <div style="color:var(--mu);font-size:.82rem">שלח את הקוד לחברים:</div>
        <div class="bigcode" id="lobbyCode">-----</div>
        <button class="copybtn" onclick="copyLink()">📋 העתק קישור</button>
      </div>
      <div class="prog-wrap">
        <div class="prog-row">
          <span style="color:var(--mu);font-size:.82rem">שחקנים שהצטרפו</span>
          <span class="f" style="color:var(--y);font-size:1.05rem" id="progTxt">0 / 0</span>
        </div>
        <div class="prog-bar-bg"><div class="prog-bar" id="progBar" style="width:0%"></div></div>
      </div>
      <div class="pslots" id="slots"></div>
      <button class="btn btn-blue" id="startBtn" onclick="doStart()" disabled>🎨 התחל משחק!</button>
      <div id="lobbyMsg" style="text-align:center;color:var(--mu);margin-top:9px;font-size:.88rem"></div>
    </div>
  </div>

  <!-- DRAW -->
  <div id="sDraw" class="screen fu">
    <div class="scores" id="scores1"></div>
    <div class="round-row">
      <span class="f" style="color:var(--y);font-size:.95rem" id="roundLbl"></span>
      <div><span class="timer f" id="timerEl">60</span><span style="color:var(--mu);font-size:.82rem"> שנ'</span></div>
    </div>
    <div class="topic-box">
      <span style="color:var(--mu);font-size:.82rem">נושא:</span>
      <strong id="topicEl" style="font-size:1.05rem"></strong>
    </div>
    <div class="card" style="padding:16px;position:relative">
      <div class="tools">
        <button class="tbtn on" id="penBtn" onclick="setTool('pen')">✏️ עט</button>
        <button class="tbtn" id="erBtn" onclick="setTool('eraser')">🧹 מחק</button>
        <input type="range" id="bSize" min="2" max="30" value="6" style="accent-color:var(--bl);width:75px"/>
        <div id="swatches" style="display:flex;gap:4px;flex-wrap:wrap"></div>
      </div>
      <div style="position:relative">
        <canvas id="cv" width="1000" height="560"></canvas>
        <div id="subOver" style="display:none;position:absolute;inset:0;background:rgba(10,9,24,.82);border-radius:10px;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;font-family:'Fredoka One',cursive;font-size:1.3rem">
          <span>✅</span><span>הציור נשלח!</span>
          <span style="color:var(--mu);font-family:'Heebo',sans-serif;font-size:.88rem">ממתין לשאר...</span>
        </div>
      </div>
      <div class="cactions">
        <button class="btn btn-blue" style="flex:1;font-size:.95rem;background:var(--surf);color:var(--mu);border:1px solid var(--b)" onclick="clearCv()">🗑️ נקה</button>
        <button class="btn btn-green" style="flex:2" id="submitBtn" onclick="submitDraw()">✅ שלח ציור!</button>
      </div>
    </div>
    <div class="wlist" id="wlist"></div>
  </div>

  <!-- JUDGE -->
  <div id="sJudge" class="screen fu">
    <div class="scores" id="scores2"></div>
    <div class="card">
      <h2 class="f" style="text-align:center;font-size:1.7rem;margin-bottom:20px;background:linear-gradient(135deg,#ff6b6b,#ffd93d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">⚖️ השופט שופט...</h2>
      <div class="dgrid" id="dgrid"></div>
      <div id="judgeSpinner" style="text-align:center;padding:18px">
        <div class="spin" style="margin:0 auto 10px"></div>
        <p style="color:var(--mu)">השופט AI בוחן...</p>
      </div>
      <div id="verdictWrap" style="display:none">
        <div class="vbox" id="vbox"></div>
        <button class="btn btn-yel" id="nextBtn" onclick="doNext()" style="display:none"></button>
      </div>
    </div>
  </div>

  <!-- FINAL -->
  <div id="sFinal" class="screen fu" style="text-align:center">
    <div class="bo" style="font-size:4rem;margin-bottom:14px">🏆</div>
    <h2 class="f" style="font-size:2rem;margin-bottom:6px;background:linear-gradient(135deg,var(--y),var(--r));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">המשחק הסתיים!</h2>
    <p id="finalMsg" style="color:var(--mu);margin-bottom:24px"></p>
    <div class="card" style="text-align:right"><div id="finalList"></div></div>
    <button class="btn btn-blue" style="margin-top:16px;max-width:260px" onclick="location.reload()">🏠 משחק חדש</button>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────
const DRAW_COLS = ["#000","#fff","#ef4444","#f97316","#eab308","#22c55e","#3b82f6","#8b5cf6","#ec4899","#92400e","#6b7280","#06b6d4"];
let socket, myId, myCode, amHost=false;
let tool="pen", col="#000", bsz=6, drawing=false, lx=0, ly=0, submitted=false;
let shownDrawings={}, curRoom=null;
let maxPl=2;

// ── Socket ────────────────────────────────────────────────────────────
socket = io();
socket.on("connect", () => { myId = socket.id; });

socket.on("created", code => {
  myCode = code;
  amHost = true;
  document.getElementById("lobbyCode").textContent = code;
  go("sLobby");
});

socket.on("state", room => {
  curRoom = room;
  amHost = (myId === room.hostId);
  if (room.phase === "lobby")   { go("sLobby");  renderLobby(room); }
  if (room.phase === "drawing") { go("sDraw");   renderDraw(room); }
  if (room.phase === "judging") { go("sJudge");  renderJudging(room); }
  if (room.phase === "results") { go("sJudge");  renderResults(room); }
  if (room.phase === "done")    { go("sFinal");  renderFinal(room); confetti(); }
  renderScores(room);
});

socket.on("tick", t => {
  const el = document.getElementById("timerEl");
  if (!el) return;
  el.textContent = t;
  el.className = "timer f" + (t<=10?" red":"");
});

socket.on("drawings", d => { shownDrawings = d; renderDrawingsGrid(curRoom); });

socket.on("err", msg => toast(msg));

// ── Actions ───────────────────────────────────────────────────────────
function createRoom() {
  const name = document.getElementById("cName").value.trim() || "מארח";
  socket.emit("create", { name, maxPlayers: maxPl });
}

function joinRoom() {
  const name = document.getElementById("jName").value.trim() || "שחקן";
  const code = document.getElementById("jCode").value.trim().toUpperCase();
  if (!code) return toast("הכנס קוד חדר");
  myCode = code;
  document.getElementById("lobbyCode").textContent = code;
  socket.emit("join", { code, name });
  go("sLobby");
}

function doStart() { socket.emit("start"); }
function doNext()  { socket.emit("next"); }

function submitDraw() {
  if (submitted) return;
  const data = document.getElementById("cv").toDataURL("image/png");
  socket.emit("draw", { drawing: data });
  submitted = true;
  const ov = document.getElementById("subOver");
  ov.style.display = "flex";
  document.getElementById("submitBtn").disabled = true;
}

// ── Canvas ────────────────────────────────────────────────────────────
function initCanvas() {
  const cv = document.getElementById("cv");
  const ctx = cv.getContext("2d");
  ctx.fillStyle = "#fff";
  ctx.fillRect(0,0,cv.width,cv.height);

  // swatches
  const sw = document.getElementById("swatches");
  sw.innerHTML = DRAW_COLS.map(c =>
    `<div class="swatch${c===col?" on":""}" style="background:${c}" onclick="setCol('${c}')"></div>`
  ).join("");

  document.getElementById("bSize").oninput = e => bsz = +e.target.value;

  const pos = e => {
    const r = cv.getBoundingClientRect();
    const sx = cv.width/r.width, sy = cv.height/r.height;
    const cx = e.touches?e.touches[0].clientX:e.clientX;
    const cy = e.touches?e.touches[0].clientY:e.clientY;
    return { x:(cx-r.left)*sx, y:(cy-r.top)*sy };
  };

  cv.onmousedown   = e => { if(submitted)return; drawing=true; const p=pos(e); lx=p.x; ly=p.y; };
  cv.onmousemove   = e => { if(!drawing||submitted)return; paint(ctx,pos(e)); };
  cv.onmouseup     = cv.onmouseleave = () => drawing=false;
  cv.ontouchstart  = e => { e.preventDefault(); if(submitted)return; drawing=true; const p=pos(e); lx=p.x; ly=p.y; };
  cv.ontouchmove   = e => { e.preventDefault(); if(!drawing||submitted)return; paint(ctx,pos(e)); };
  cv.ontouchend    = () => drawing=false;
}

function paint(ctx, p) {
  ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p.x,p.y);
  ctx.strokeStyle = tool==="eraser"?"#fff":col;
  ctx.lineWidth   = tool==="eraser"?bsz*3:bsz;
  ctx.lineCap="round"; ctx.lineJoin="round"; ctx.stroke();
  lx=p.x; ly=p.y;
}

function setTool(t) {
  tool=t;
  document.getElementById("penBtn").classList.toggle("on",t==="pen");
  document.getElementById("erBtn").classList.toggle("on",t==="eraser");
}

function setCol(c) {
  col=c; setTool("pen");
  document.querySelectorAll(".swatch").forEach(s=>s.classList.toggle("on",s.style.background===c||s.style.background===hex2rgb(c)));
}

function hex2rgb(h) {
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return `rgb(${r}, ${g}, ${b})`;
}

function clearCv() {
  if(submitted)return;
  const cv=document.getElementById("cv");
  const ctx=cv.getContext("2d");
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,cv.width,cv.height);
}

// ── Render ────────────────────────────────────────────────────────────
function renderLobby(room) {
  const cur=room.players.length, max=room.maxPlayers;
  document.getElementById("progTxt").textContent=`${cur} / ${max}`;
  document.getElementById("progBar").style.width=`${(cur/max)*100}%`;

  const slots=[];
  for(let i=0;i<max;i++){
    const p=room.players[i];
    if(p){
      slots.push(`<div class="pslot">
        <div class="dot" style="background:${p.color}"></div>
        <span style="font-weight:700;flex:1">${p.name}</span>
        ${p.id===room.hostId
          ?'<span class="badge badge-host">👑 מארח</span>'
          :'<span class="badge badge-ready">✅ מוכן</span>'}
      </div>`);
    } else {
      slots.push(`<div class="pslot empty">
        <div class="dot" style="background:var(--mu)"></div>
        <span style="color:var(--mu);flex:1">ממתין לשחקן ${i+1}...</span>
        <span style="animation:pulse 1.5s ease infinite">⏳</span>
      </div>`);
    }
  }
  document.getElementById("slots").innerHTML=slots.join("");

  const allReady = cur>=max;
  const btn=document.getElementById("startBtn");
  const msg=document.getElementById("lobbyMsg");

  if(amHost){
    btn.style.display="block";
    btn.disabled=!allReady;
    btn.textContent=allReady?"🎨 כולם מוכנים — התחל!":"🎨 התחל משחק!";
    btn.style.background=allReady?"linear-gradient(135deg,#6bcb77,#2ea04b)":"";
    msg.textContent=allReady?"":(`ממתין ל-${max-cur} שחקנים נוספים...`);
  } else {
    btn.style.display="none";
    msg.textContent=allReady?"ממתין שהמארח יתחיל...":`ממתין לעוד ${max-cur} שחקנים...`;
  }
}

function renderScores(room) {
  const html=room.players.map(p=>`
    <div class="sc">
      <div class="dot" style="background:${p.color}"></div>
      <span class="sc-name">${p.name}</span>
      <span>${"⭐".repeat(p.score||0)}</span>
    </div>`).join("");
  ["scores1","scores2"].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=html;});
}

function renderDraw(room) {
  document.getElementById("topicEl").textContent=room.topic;
  document.getElementById("roundLbl").textContent=`סיבוב ${room.round} מתוך 5`;

  // waiting list
  document.getElementById("wlist").innerHTML=room.players.map(p=>`
    <div class="witem">
      <div class="dot" style="background:${p.color}"></div>
      <span style="flex:1;font-weight:700">${p.name}</span>
      <span>${room.submitted.includes(p.id)?"✅":"⏳"}</span>
    </div>`).join("");
}

function renderJudging(room) {
  renderDrawingsGrid(room);
  document.getElementById("judgeSpinner").style.display="block";
  document.getElementById("verdictWrap").style.display="none";
}

function renderDrawingsGrid(room) {
  if(!room) return;
  const cols=Math.min(room.players.length,2);
  const grid=document.getElementById("dgrid");
  grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  grid.innerHTML=room.players.map(p=>`
    <div class="dcard${room.lastWinner?.id===p.id?" win":""}" id="dc_${p.id}">
      ${shownDrawings[p.id]?`<img src="${shownDrawings[p.id]}" alt="${p.name}"/>`:'<div style="height:100px;display:flex;align-items:center;justify-content:center;color:var(--mu)">⏳</div>'}
      <div class="dname" style="color:${p.color}">${p.name}</div>
      ${room.lastWinner?.id===p.id?'<div style="font-size:1.1rem;margin-top:3px">🏆</div>':''}
    </div>`).join("");
}

function renderResults(room) {
  renderDrawingsGrid(room);
  document.getElementById("judgeSpinner").style.display="none";
  const w=room.lastWinner;
  if(w){
    document.getElementById("vbox").innerHTML=`
      <div class="vwinner" style="color:${w.color}">🏆 ${w.name} ניצח!</div>
      <div class="vreason">${w.reason}</div>`;
    const nb=document.getElementById("nextBtn");
    document.getElementById("verdictWrap").style.display="block";
    if(amHost){
      nb.style.display="block";
      nb.textContent=room.round>=5?"🎊 סיים משחק!":"➡️ לסיבוב הבא";
    } else {
      nb.style.display="none";
    }
  }
}

function renderFinal(room) {
  const sorted=[...room.players].sort((a,b)=>(b.score||0)-(a.score||0));
  const top=sorted[0];
  const tied=sorted.filter(p=>(p.score||0)===(top.score||0));
  document.getElementById("finalMsg").textContent=
    tied.length>1?`🤝 תיקו בין ${tied.map(p=>p.name).join(" ו")}!`:`מזל טוב ${top.name}! 🎉`;
  document.getElementById("finalList").innerHTML=sorted.map((p,i)=>`
    <div class="frow">
      <span class="f" style="font-size:1.3rem;width:32px;text-align:center">${["🥇","🥈","🥉","4️⃣"][i]||i+1}</span>
      <div class="dot" style="background:${p.color}"></div>
      <span style="flex:1;font-weight:700">${p.name}</span>
      <span>${"⭐".repeat(p.score||0)}</span>
      <span style="color:var(--mu);font-size:.88rem;margin-right:6px">${p.score||0} נק'</span>
    </div>`).join("");
}

// ── Utils ─────────────────────────────────────────────────────────────
function go(id) {
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if(id==="sDraw") {
    submitted=false;
    document.getElementById("subOver").style.display="none";
    document.getElementById("submitBtn").disabled=false;
    initCanvas();
  }
}

function tab(t) {
  document.getElementById("t1").classList.toggle("on",t==="create");
  document.getElementById("t2").classList.toggle("on",t==="join");
  document.getElementById("pCreate").style.display=t==="create"?"block":"none";
  document.getElementById("pJoin").style.display=t==="join"?"block":"none";
}

function setMax(n) {
  maxPl=n;
  [2,3,4].forEach(i=>document.getElementById("mp"+i).classList.toggle("on",i===n));
}

function copyLink() {
  const code=document.getElementById("lobbyCode").textContent;
  navigator.clipboard.writeText(`${location.origin}?room=${code}`)
    .then(()=>toast("הקישור הועתק! 📋"));
}

function toast(msg) {
  const t=document.createElement("div");
  t.className="toast"; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

function confetti() {
  const cs=["#ff6b6b","#ffd93d","#6bcb77","#4d96ff","#ff6fc8","#a78bfa"];
  const c=document.getElementById("conf"); c.innerHTML="";
  for(let i=0;i<80;i++){
    const p=document.createElement("div");
    p.className="cp";
    p.style.cssText=`left:${Math.random()*100}%;background:${cs[i%cs.length]};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.7}s`;
    c.appendChild(p);
  }
  setTimeout(()=>c.innerHTML="",4500);
}

// auto-join from URL
const urlRoom=new URLSearchParams(location.search).get("room");
if(urlRoom){ tab("join"); document.getElementById("jCode").value=urlRoom.toUpperCase(); }
</script>
