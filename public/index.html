<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>תחרות הציורים של רומי</title>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Heebo:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0918;--card:#1e1b38;--surf:#14122a;--brd:rgba(255,255,255,0.08);--r:#ff6b6b;--y:#ffd93d;--g:#6bcb77;--bl:#4d96ff;--tx:#f0eeff;--mu:#7b79a0}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;direction:rtl}
input,button{font-family:inherit}
.f{font-family:'Fredoka One',cursive!important}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes fall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fu{animation:fadeUp .3s ease both}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--y);border-radius:50%;animation:spin .8s linear infinite}
.bo{animation:bounce 1s ease infinite}
.wrap{max-width:800px;margin:0 auto;padding:20px 14px}
.screen{display:none}.screen.active{display:block}
.card{background:var(--card);border-radius:18px;padding:22px;border:1px solid var(--brd);margin-bottom:14px}
.title{font-size:clamp(1.6rem,5vw,2.5rem);text-align:center;margin-bottom:4px;background:linear-gradient(135deg,#ff6b6b,#ffd93d,#4d96ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{text-align:center;color:var(--mu);margin-bottom:24px;font-size:.9rem}
.inp{width:100%;background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:11px 14px;color:var(--tx);font-size:1rem;margin-bottom:12px}
.inp:focus{outline:none;border-color:var(--bl)}
.lbl{color:var(--mu);font-size:.82rem;display:block;margin-bottom:5px}
.btn{width:100%;padding:13px;border-radius:12px;border:none;cursor:pointer;font-size:1.05rem;font-family:'Fredoka One',cursive;transition:all .2s}
.btn:hover{transform:translateY(-2px)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.btn-blue{background:linear-gradient(135deg,var(--bl),#7b2fff);color:#fff}
.btn-green{background:linear-gradient(135deg,var(--g),#2ea04b);color:#fff}
.btn-yel{background:linear-gradient(135deg,var(--y),#ff8c42);color:#111}
.mpgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.mpbtn{padding:9px;border-radius:9px;border:2px solid var(--brd);background:var(--surf);color:var(--mu);cursor:pointer;text-align:center;font-weight:700;font-size:.88rem;transition:all .2s}
.mpbtn.on{border-color:var(--y);color:var(--y);background:rgba(255,217,61,.1)}
.dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.tab{padding:10px;border-radius:10px;border:2px solid var(--brd);background:var(--surf);color:var(--mu);cursor:pointer;text-align:center;font-weight:700;transition:all .2s}
.tab.on{border-color:var(--bl);color:var(--bl);background:rgba(77,150,255,.1)}
.room-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;min-height:60px}
.room-item{display:flex;align-items:center;gap:12px;background:var(--surf);border-radius:10px;padding:12px 16px;border:1px solid var(--brd);cursor:pointer;transition:all .2s}
.room-item:hover{border-color:var(--bl)}
.room-item.sel{border-color:var(--bl);background:rgba(77,150,255,.1)}
.no-rooms{text-align:center;color:var(--mu);padding:20px;font-size:.88rem}
.pslots{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.pslot{display:flex;align-items:center;gap:10px;background:var(--surf);border-radius:10px;padding:10px 14px;border:1px solid var(--brd)}
.pslot.empty{opacity:.4;border-style:dashed}
.badge{font-size:.7rem;padding:2px 7px;border-radius:20px}
.bhost{background:rgba(255,217,61,.15);color:var(--y)}
.bready{background:rgba(107,203,119,.15);color:var(--g)}
.prog-bg{background:var(--surf);border-radius:20px;height:8px;overflow:hidden;margin-bottom:14px}
.prog-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--bl),#7b2fff);transition:width .4s}
.scores{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.sc{display:flex;align-items:center;gap:6px;flex:1;min-width:85px;background:var(--surf);border-radius:9px;padding:6px 10px}
.round-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.topic-box{background:var(--surf);border-radius:10px;padding:9px 14px;margin-bottom:11px;display:flex;gap:7px;align-items:center;border:1px solid var(--brd)}
.tnum{font-size:2.4rem;display:inline-block}
.tnum.red{color:var(--r);animation:bounce .5s ease infinite}
.tools{display:flex;align-items:center;gap:6px;margin-bottom:9px;flex-wrap:wrap}
.tbtn{background:var(--surf);border:1px solid var(--brd);color:var(--tx);padding:5px 11px;border-radius:7px;cursor:pointer;font-size:.82rem;transition:all .15s}
.tbtn.on{background:var(--bl);border-color:var(--bl)}
.sw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s;flex-shrink:0}
.sw.on{border-color:#fff;transform:scale(1.25)}
canvas{display:block;width:100%;cursor:crosshair;touch-action:none;border-radius:10px;border:2px solid var(--brd);background:#fff}
.cact{display:flex;gap:8px;margin-top:10px}
.sub-over{display:none;position:absolute;inset:0;background:rgba(10,9,24,.82);border-radius:10px;flex-direction:column;align-items:center;justify-content:center;gap:10px;font-family:'Fredoka One',cursive;font-size:1.3rem}
.wlist{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.witem{display:flex;align-items:center;gap:8px;background:var(--surf);border-radius:9px;padding:7px 12px;font-size:.87rem}
.dgrid{display:grid;gap:10px;margin-bottom:16px}
.dcard{background:var(--surf);border-radius:10px;padding:10px;text-align:center;border:2px solid transparent;transition:all .35s}
.dcard.win{border-color:var(--y);box-shadow:0 0 18px rgba(255,217,61,.25)}
.dcard img{width:100%;border-radius:7px;margin-bottom:6px}
.vbox{background:var(--surf);border-radius:12px;padding:16px;border-right:4px solid var(--y);margin-bottom:14px}
.frow{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--brd)}
.frow:last-child{border:none}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--r);color:#fff;padding:10px 20px;border-radius:10px;font-weight:700;z-index:999;animation:fadeUp .3s ease;white-space:nowrap}
#conf{position:fixed;inset:0;pointer-events:none;z-index:998}
.cp{position:absolute;width:9px;height:9px;border-radius:2px;animation:fall linear forwards}
</style>
</head>
<body>
<div id="conf"></div>
<div class="wrap">
  <h1 class="f title fu">&#127912; תחרות הציורים של רומי</h1>
  <p class="sub">צייר, התחרה, נצח!</p>

  <!-- HOME -->
  <div id="sHome" class="screen active fu">
    <div class="card">
      <div class="tabs">
        <div class="tab on" id="t1" onclick="switchTab('create')">פתח חדר חדש</div>
        <div class="tab" id="t2" onclick="switchTab('join')">הצטרף לחדר</div>
      </div>
      <div id="pCreate">
        <label class="lbl">השם שלך</label>
        <input class="inp" id="cName" placeholder="הכנס שם..."/>
        <label class="lbl">כמה שחקנים?</label>
        <div class="mpgrid">
          <div class="mpbtn on" id="mp2" onclick="setMax(2)">2 שחקנים</div>
          <div class="mpbtn" id="mp3" onclick="setMax(3)">3 שחקנים</div>
        </div>
        <button class="btn btn-blue" onclick="doCreate()">&#10024; פתח חדר</button>
      </div>
      <div id="pJoin" style="display:none">
        <label class="lbl">השם שלך</label>
        <input class="inp" id="jName" placeholder="הכנס שם..."/>
        <label class="lbl" style="margin-bottom:8px">בחר חדר לפי שם המארח:</label>
        <div class="room-list" id="roomList"><div class="no-rooms">אין חדרים פתוחים כרגע...</div></div>
        <button class="btn btn-blue" id="joinBtn" onclick="doJoin()" disabled>&#128682; הצטרף</button>
      </div>
    </div>
  </div>

  <!-- LOBBY -->
  <div id="sLobby" class="screen fu">
    <div class="card">
      <h2 class="f" style="color:var(--y);margin-bottom:14px;font-size:1.2rem">&#127918; ממתינים לשחקנים...</h2>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="color:var(--mu);font-size:.82rem">שחקנים שהצטרפו</span>
        <span class="f" style="color:var(--y)" id="progTxt">0/0</span>
      </div>
      <div class="prog-bg"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
      <div class="pslots" id="slots"></div>
      <button class="btn btn-blue" id="startBtn" onclick="socket.emit('start')" disabled>&#127912; התחל משחק!</button>
      <div id="lobbyMsg" style="text-align:center;color:var(--mu);margin-top:8px;font-size:.87rem"></div>
    </div>
  </div>

  <!-- DRAW -->
  <div id="sDraw" class="screen fu">
    <div class="scores" id="scores1"></div>
    <div class="round-row">
      <span class="f" style="color:var(--y);font-size:.93rem" id="roundLbl"></span>
      <div><span class="tnum f" id="timerEl">60</span><span style="color:var(--mu);font-size:.8rem"> שנ'</span></div>
    </div>
    <div class="topic-box">
      <span style="color:var(--mu);font-size:.8rem">נושא:</span>
      <strong id="topicEl" style="font-size:1.05rem"></strong>
    </div>
    <div class="card" style="padding:14px;position:relative">
      <div class="tools">
        <button class="tbtn on" id="penBtn" onclick="setTool('pen')">&#9999; עט</button>
        <button class="tbtn" id="erBtn" onclick="setTool('eraser')">&#129529; מחק</button>
        <input type="range" id="bSize" min="2" max="30" value="6" style="accent-color:var(--bl);width:72px"/>
        <div id="swatches" style="display:flex;gap:4px;flex-wrap:wrap"></div>
      </div>
      <div style="position:relative">
        <canvas id="cv" width="1000" height="800"></canvas>
        <div class="sub-over" id="subOver">
          <span>&#9989;</span><span>הציור נשלח!</span>
          <span style="color:var(--mu);font-family:'Heebo',sans-serif;font-size:.85rem">ממתין לשאר...</span>
        </div>
      </div>
      <div class="cact">
        <button class="btn" style="flex:1;font-size:.92rem;background:var(--surf);color:var(--mu);border:1px solid var(--brd);font-family:'Heebo',sans-serif" onclick="clearCv()">&#128465; נקה</button>
        <button class="btn btn-green" style="flex:2;font-size:1rem" id="submitBtn" onclick="submitDraw()">&#9989; שלח ציור!</button>
      </div>
    </div>
    <div class="wlist" id="wlist"></div>
  </div>

  <!-- JUDGE -->
  <div id="sJudge" class="screen fu">
    <div class="scores" id="scores2"></div>
    <div class="card">
      <h2 class="f" style="text-align:center;font-size:1.6rem;margin-bottom:18px;background:linear-gradient(135deg,#ff6b6b,#ffd93d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">&#9878; השופט שופט...</h2>
      <div class="dgrid" id="dgrid"></div>
      <div id="judgeSpinner" style="text-align:center;padding:16px">
        <div class="spinner" style="margin:0 auto 10px"></div>
        <p style="color:var(--mu)">השופט AI בוחן...</p>
      </div>
      <div id="verdictWrap" style="display:none">
        <div class="vbox" id="vbox"></div>
        <button class="btn btn-yel" id="nextBtn" onclick="socket.emit('next')" style="display:none;margin-top:4px"></button>
      </div>
    </div>
  </div>

  <!-- FINAL -->
  <div id="sFinal" class="screen fu" style="text-align:center">
    <div class="bo" style="font-size:3.8rem;margin-bottom:12px">&#127942;</div>
    <h2 class="f" style="font-size:1.9rem;margin-bottom:6px;background:linear-gradient(135deg,var(--y),var(--r));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">המשחק הסתיים!</h2>
    <p id="finalMsg" style="color:var(--mu);margin-bottom:22px"></p>
    <div class="card" style="text-align:right"><div id="finalList"></div></div>
    <button class="btn btn-blue" style="margin-top:14px;max-width:240px" onclick="location.reload()">&#127968; משחק חדש</button>
  </div>
</div>

<script>
var COLS=["#000","#fff","#ef4444","#f97316","#eab308","#22c55e","#3b82f6","#8b5cf6","#ec4899","#92400e","#6b7280","#06b6d4"];
var socket,myId,myRoomId,amHost=false;
var tool="pen",col="#000",bsz=6,isDrawing=false,lx=0,ly=0,submitted=false;
var shownDrawings={},curRoom=null,maxPl=2,selRoomId=null,canvasInited=false;

socket=io();
socket.on("connect",function(){myId=socket.id;});

socket.on("lobby_list",function(list){renderRoomList(list);});

socket.on("joined",function(roomId){
  myRoomId=roomId;
  go("sLobby");
});

socket.on("state",function(room){
  curRoom=room;
  amHost=(myId===room.hostId);
  renderScores(room);
  if(room.phase==="lobby"){goSafe("sLobby");renderLobby(room);}
  if(room.phase==="drawing"){goSafe("sDraw");renderDraw(room);}
  if(room.phase==="judging"){goSafe("sJudge");renderJudging(room);}
  if(room.phase==="results"){goSafe("sJudge");renderResults(room);}
  if(room.phase==="done"){go("sFinal");renderFinal(room);confetti();}
});

socket.on("tick",function(t){
  var el=document.getElementById("timerEl");
  if(!el)return;
  el.textContent=t;
  el.className="tnum f"+(t<=10?" red":"");
});

socket.on("drawings",function(d){
  shownDrawings=d;
  if(curRoom)renderDrawingsGrid(curRoom);
});

socket.on("err",function(msg){toast(msg);});

function doCreate(){
  var name=document.getElementById("cName").value.trim()||"מארח";
  socket.emit("create",{name:name,maxPlayers:maxPl});
}

function doJoin(){
  if(!selRoomId)return toast("בחר חדר מהרשימה");
  var name=document.getElementById("jName").value.trim()||"שחקן";
  socket.emit("join",{roomId:selRoomId,name:name});
}

function submitDraw(){
  if(submitted)return;
  var data=document.getElementById("cv").toDataURL("image/png");
  socket.emit("draw",{drawing:data});
  submitted=true;
  document.getElementById("subOver").style.display="flex";
  document.getElementById("submitBtn").disabled=true;
}

function initCanvas(){
  if(canvasInited)return;
  canvasInited=true;
  var cv=document.getElementById("cv");
  var ctx=cv.getContext("2d");
  ctx.fillStyle="#fff";ctx.fillRect(0,0,cv.width,cv.height);

  var sw=document.getElementById("swatches");
  sw.innerHTML=COLS.map(function(c){
    return '<div class="sw'+(c===col?" on":"")+'" style="background:'+c+'" onclick="setCol(\''+c+'\')"></div>';
  }).join("");

  document.getElementById("bSize").oninput=function(e){bsz=+e.target.value;};

  function pos(e){
    var rect=cv.getBoundingClientRect();
    var sx=cv.width/rect.width,sy=cv.height/rect.height;
    var cx=e.touches?e.touches[0].clientX:e.clientX;
    var cy=e.touches?e.touches[0].clientY:e.clientY;
    return{x:(cx-rect.left)*sx,y:(cy-rect.top)*sy};
  }

  cv.onmousedown=function(e){if(submitted)return;isDrawing=true;var p=pos(e);lx=p.x;ly=p.y;};
  cv.onmousemove=function(e){if(!isDrawing||submitted)return;paint(ctx,pos(e));};
  cv.onmouseup=function(){isDrawing=false;};
  cv.onmouseleave=function(){isDrawing=false;};
  cv.ontouchstart=function(e){e.preventDefault();if(submitted)return;isDrawing=true;var p=pos(e);lx=p.x;ly=p.y;};
  cv.ontouchmove=function(e){e.preventDefault();if(!isDrawing||submitted)return;paint(ctx,pos(e));};
  cv.ontouchend=function(){isDrawing=false;};
}

function paint(ctx,p){
  ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);
  ctx.strokeStyle=tool==="eraser"?"#fff":col;
  ctx.lineWidth=tool==="eraser"?bsz*3:bsz;
  ctx.lineCap="round";ctx.lineJoin="round";ctx.stroke();
  lx=p.x;ly=p.y;
}

function setTool(t){
  tool=t;
  document.getElementById("penBtn").classList.toggle("on",t==="pen");
  document.getElementById("erBtn").classList.toggle("on",t==="eraser");
}

function setCol(c){
  col=c;setTool("pen");
  document.querySelectorAll(".sw").forEach(function(s){
    s.classList.toggle("on",s.style.background===c||s.style.background===hex2rgb(c));
  });
}

function hex2rgb(h){
  var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return"rgb("+r+", "+g+", "+b+")";
}

function clearCv(){
  if(submitted)return;
  var cv=document.getElementById("cv"),ctx=cv.getContext("2d");
  ctx.fillStyle="#fff";ctx.fillRect(0,0,cv.width,cv.height);
}

function renderRoomList(list){
  var el=document.getElementById("roomList");
  if(!el)return;
  if(!list||list.length===0){
    el.innerHTML='<div class="no-rooms">אין חדרים פתוחים כרגע...<br><small>פתח חדר חדש וחכה שחברים יצטרפו</small></div>';
    selRoomId=null;
    var jb=document.getElementById("joinBtn");
    if(jb)jb.disabled=true;
    return;
  }
  el.innerHTML=list.map(function(r){
    return '<div class="room-item'+(r.id===selRoomId?" sel":"")+'" data-id="'+r.id+'" onclick="selectRoom(this,\''+r.id+'\')">'
      +'<span style="font-size:1.3rem">&#127918;</span>'
      +'<div style="flex:1"><div style="font-weight:700">החדר של '+r.host+'</div>'
      +'<div style="color:var(--mu);font-size:.8rem">'+r.count+' / '+r.max+' שחקנים</div></div>'
      +'<span style="color:var(--g);font-size:.8rem">פתוח ✅</span>'
      +'</div>';
  }).join("");
}

function selectRoom(el,id){
  selRoomId=id;
  document.querySelectorAll(".room-item").forEach(function(e){e.classList.remove("sel");});
  el.classList.add("sel");
  var jb=document.getElementById("joinBtn");
  if(jb)jb.disabled=false;
}

function renderLobby(room){
  var cur=room.players.length,max=room.maxPlayers;
  document.getElementById("progTxt").textContent=cur+" / "+max;
  document.getElementById("progFill").style.width=((cur/max)*100)+"%";
  var slots="";
  for(var i=0;i<max;i++){
    var p=room.players[i];
    if(p){
      slots+='<div class="pslot"><div class="dot" style="background:'+p.color+'"></div>'
        +'<span style="font-weight:700;flex:1">'+p.name+'</span>'
        +(p.id===room.hostId?'<span class="badge bhost">&#128081; מארח</span>':'<span class="badge bready">&#10003; מוכן</span>')
        +'</div>';
    }else{
      slots+='<div class="pslot empty"><div class="dot" style="background:var(--mu)"></div>'
        +'<span style="color:var(--mu);flex:1">ממתין לשחקן '+(i+1)+'...</span>'
        +'<span style="animation:pulse 1.5s ease infinite">&#9203;</span></div>';
    }
  }
  document.getElementById("slots").innerHTML=slots;
  var allReady=cur>=max;
  var btn=document.getElementById("startBtn");
  var msg=document.getElementById("lobbyMsg");
  if(amHost){
    btn.style.display="block";
    btn.disabled=!allReady;
    btn.textContent=allReady?"🎨 כולם מוכנים — התחל!":"🎨 התחל משחק!";
    btn.style.background=allReady?"linear-gradient(135deg,#6bcb77,#2ea04b)":"";
    msg.textContent=allReady?"":"ממתין ל-"+(max-cur)+" שחקנים נוספים...";
  }else{
    btn.style.display="none";
    msg.textContent=allReady?"ממתין שהמארח יתחיל...":"ממתין לעוד "+(max-cur)+" שחקנים...";
  }
}

function renderScores(room){
  var html=room.players.map(function(p){
    return'<div class="sc"><div class="dot" style="background:'+p.color+'"></div>'
      +'<span style="font-size:.82rem;font-weight:700;flex:1">'+p.name+'</span>'
      +'<span>'+"⭐".repeat(p.score||0)+'</span></div>';
  }).join("");
  ["scores1","scores2"].forEach(function(id){var el=document.getElementById(id);if(el)el.innerHTML=html;});
}

function renderDraw(room){
  document.getElementById("topicEl").textContent=room.topic;
  document.getElementById("roundLbl").textContent="סיבוב "+room.round+" מתוך 5";
  document.getElementById("wlist").innerHTML=room.players.map(function(p){
    var done=room.submitted.indexOf(p.id)>=0;
    return'<div class="witem"><div class="dot" style="background:'+p.color+'"></div>'
      +'<span style="flex:1;font-weight:700">'+p.name+'</span>'
      +'<span>'+(done?"✅":"⏳")+'</span></div>';
  }).join("");
}

function renderJudging(room){
  renderDrawingsGrid(room);
  document.getElementById("judgeSpinner").style.display="block";
  document.getElementById("verdictWrap").style.display="none";
}

function renderDrawingsGrid(room){
  if(!room)return;
  var cols=Math.min(room.players.length,2);
  var grid=document.getElementById("dgrid");
  if(!grid)return;
  grid.style.gridTemplateColumns="repeat("+cols+",1fr)";
  grid.innerHTML=room.players.map(function(p){
    var isWin=room.lastWinner&&room.lastWinner.id===p.id;
    return'<div class="dcard'+(isWin?" win":"")+'">'
      +(shownDrawings[p.id]?'<img src="'+shownDrawings[p.id]+'" alt="'+p.name+'"/>'
        :'<div style="height:90px;display:flex;align-items:center;justify-content:center;color:var(--mu)">&#9203;</div>')
      +'<div style="font-weight:700;font-size:.87rem;color:'+p.color+'">'+p.name+'</div>'
      +(isWin?'<div style="font-size:1rem;margin-top:3px">&#127942;</div>':"")
      +'</div>';
  }).join("");
}

function renderResults(room){
  renderDrawingsGrid(room);
  document.getElementById("judgeSpinner").style.display="none";
  var w=room.lastWinner;
  if(w){
    document.getElementById("vbox").innerHTML=
      '<div class="f" style="font-size:1.35rem;color:'+w.color+';margin-bottom:6px">&#127942; '+w.name+' ניצח!</div>'
      +'<div style="color:var(--mu);line-height:1.55;font-size:.92rem">'+w.reason+'</div>';
    document.getElementById("verdictWrap").style.display="block";
    var nb=document.getElementById("nextBtn");
    if(amHost){nb.style.display="block";nb.textContent=room.round>=5?"🎊 סיים משחק!":"➡️ לסיבוב הבא";}
    else{nb.style.display="none";}
  }
}

function renderFinal(room){
  var sorted=room.players.slice().sort(function(a,b){return(b.score||0)-(a.score||0);});
  var top=sorted[0];
  var tied=sorted.filter(function(p){return(p.score||0)===(top.score||0);});
  document.getElementById("finalMsg").textContent=tied.length>1?"🤝 תיקו!":"מזל טוב "+top.name+"! 🎉";
  var medals=["🥇","🥈","🥉","4️⃣"];
  document.getElementById("finalList").innerHTML=sorted.map(function(p,i){
    return'<div class="frow">'
      +'<span class="f" style="font-size:1.25rem;width:30px;text-align:center">'+medals[i]+'</span>'
      +'<div class="dot" style="background:'+p.color+'"></div>'
      +'<span style="flex:1;font-weight:700">'+p.name+'</span>'
      +'<span>'+"⭐".repeat(p.score||0)+'</span>'
      +'<span style="color:var(--mu);font-size:.85rem;margin-right:6px">'+(p.score||0)+' נק\'</span>'
      +'</div>';
  }).join("");
}

function go(id){
  document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active");});
  document.getElementById(id).classList.add("active");
  if(id==="sDraw"){
    submitted=false;canvasInited=false;
    document.getElementById("subOver").style.display="none";
    document.getElementById("submitBtn").disabled=false;
    initCanvas();
  }
}

function goSafe(id){
  if(!document.getElementById(id).classList.contains("active"))go(id);
}

function switchTab(t){
  document.getElementById("t1").classList.toggle("on",t==="create");
  document.getElementById("t2").classList.toggle("on",t==="join");
  document.getElementById("pCreate").style.display=t==="create"?"block":"none";
  document.getElementById("pJoin").style.display=t==="join"?"block":"none";
}

function setMax(n){
  maxPl=n;
  [2,3].forEach(function(i){document.getElementById("mp"+i).classList.toggle("on",i===n);});
}

function toast(msg){
  var t=document.createElement("div");t.className="toast";t.textContent=msg;
  document.body.appendChild(t);setTimeout(function(){t.remove();},3000);
}

function confetti(){
  var cs=["#ff6b6b","#ffd93d","#6bcb77","#4d96ff","#ff6fc8","#a78bfa"];
  var c=document.getElementById("conf");c.innerHTML="";
  for(var i=0;i<80;i++){
    var p=document.createElement("div");p.className="cp";
    p.style.cssText="left:"+Math.random()*100+"%;background:"+cs[i%cs.length]+";animation-duration:"+(1.5+Math.random()*2)+"s;animation-delay:"+Math.random()*.7+"s";
    c.appendChild(p);
  }
  setTimeout(function(){c.innerHTML="";},4500);
}
</script>
</body>
</html>
